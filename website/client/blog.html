<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدونة | VERO</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e7c27a;
            --primary-dark: #d4a95c;
            --primary-light: #f5e6c8;
            --secondary: #69451a;
            --secondary-light: #8b5e2c;
            --cream: #fffaf6;
            --cream-dark: #f5ebe0;
            --white: #ffffff;
            --ivory: #fffff0;
            --beige: #f5f5dc;
            --text: #1a1a1a;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-gold: 0 4px 14px rgba(231, 194, 122, 0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--beige) 100%);
            color: var(--text);
            direction: rtl;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--white);
            border-left: 1px solid var(--border);
            z-index: 100;
            overflow-y: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
        }

        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-track { background: var(--border-light); }
        .sidebar::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .sidebar-header {
            padding: 28px 24px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--white), var(--ivory));
        }

        .sidebar-header img {
            height: 55px;
            margin-bottom: 12px;
            transition: transform 0.3s ease;
        }

        .sidebar-header img:hover { transform: scale(1.05); }

        .sidebar-header h3 {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-item {
            padding: 12px 24px;
            margin: 5px 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }

        .nav-item i { width: 24px; font-size: 1.1rem; }
        .nav-item:hover {
            background: var(--primary-light);
            color: var(--secondary);
            transform: translateX(-5px);
        }
        .nav-item.active {
            background: linear-gradient(135deg, var(--primary-light), var(--ivory));
            color: var(--secondary);
            border-right: 3px solid var(--primary);
            box-shadow: var(--shadow-gold);
        }

        /* Main Content */
        .main-content {
            margin-right: 280px;
            padding: 28px 36px;
            min-height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 16px 24px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .user-avatar:hover { transform: scale(1.05); }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .logout-btn:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-2px);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border-light);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 8px;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .filter-select {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--white);
            font-family: inherit;
            cursor: pointer;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            outline: none;
            font-family: inherit;
        }

        .search-box button {
            background: var(--primary);
            border: none;
            padding: 10px 16px;
            cursor: pointer;
            color: var(--secondary);
        }

        /* Blog Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .blog-card {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border-light);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .blog-image {
            height: 200px;
            background: linear-gradient(135deg, var(--cream), var(--beige));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .blog-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .blog-image i {
            font-size: 48px;
            color: var(--primary);
        }

        .blog-content {
            padding: 20px;
        }

        .blog-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .blog-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .blog-meta i {
            color: var(--primary);
            margin-left: 4px;
        }

        .blog-excerpt {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .blog-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 12px;
        }

        .status-published {
            background: rgba(34, 197, 94, 0.15);
            color: #15803d;
        }

        .status-draft {
            background: rgba(245, 158, 11, 0.15);
            color: #d97706;
        }

        .blog-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--secondary);
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--secondary);
            padding: 7px 19px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 0.8rem;
        }
        .btn-outline:hover { background: var(--primary-light); }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .btn-danger:hover { background: #dc2626; }

        .btn-warning {
            background: var(--warning);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .btn-warning:hover { background: #ea580c; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--white);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-content h3 {
            margin-bottom: 24px;
            color: var(--secondary);
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
        }

        .modal-content input:focus,
        .modal-content select:focus,
        .modal-content textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(231, 194, 122, 0.2);
        }

        .modal-content label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--secondary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 64px;
            color: var(--primary-light);
            margin-bottom: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--white);
            color: var(--text);
            padding: 14px 24px;
            border-radius: 40px;
            box-shadow: var(--shadow-lg);
            z-index: 1100;
            animation: slideInRight 0.3s ease;
            border-right: 4px solid var(--primary);
            font-weight: 500;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toggle-sidebar {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--secondary);
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
                z-index: 200;
            }
            .sidebar.open { transform: translateX(0); }
            .main-content {
                margin-right: 0;
                padding: 20px;
            }
            .toggle-sidebar { display: block; }
            .blog-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="../verologo.png" alt="VERO" onerror="this.src='https://placehold.co/200x60/e7c27a/69451a?text=VERO'">
        <h3>VERO</h3>
    </div>
    <nav>
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-tachometer-alt"></i> الرئيسية</div>
        <div class="nav-item" onclick="window.location.href='products.html'"><i class="fas fa-box"></i> المنتجات</div>
        <div class="nav-item" onclick="window.location.href='orders.html'"><i class="fas fa-shopping-cart"></i> الطلبات</div>
        <div class="nav-item" onclick="window.location.href='media.html'"><i class="fas fa-folder-open"></i> مكتبة الوسائط</div>
        <div class="nav-item active" onclick="window.location.href='blog.html'"><i class="fas fa-blog"></i> المدونة</div>
        <div class="nav-item" onclick="window.location.href='tickets.html'"><i class="fas fa-headset"></i> الدعم</div>
        <div class="nav-item" onclick="window.location.href='billing.html'"><i class="fas fa-credit-card"></i> الفواتير</div>
        <div class="nav-item" onclick="window.location.href='analytics.html'"><i class="fas fa-chart-line"></i> الإحصائيات</div>
        <div class="nav-item" onclick="window.location.href='settings.html'"><i class="fas fa-cog"></i> الإعدادات</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</div>
    </nav>
</div>

<div class="main-content">
    <div class="top-bar">
        <button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1 class="page-title">المدونة</h1>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar">م</div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="totalPosts">-</div>
            <div class="stat-label">إجمالي المقالات</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="publishedPosts">-</div>
            <div class="stat-label">منشورة</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="draftPosts">-</div>
            <div class="stat-label">مسودة</div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <select id="statusFilter" class="filter-select" onchange="filterPosts()">
            <option value="all">جميع المقالات</option>
            <option value="published">منشورة</option>
            <option value="draft">مسودة</option>
        </select>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="بحث..." onkeyup="filterPosts()">
            <button onclick="filterPosts()"><i class="fas fa-search"></i></button>
        </div>
        <button class="btn-primary" onclick="openAddPostModal()">
            <i class="fas fa-plus"></i> مقال جديد
        </button>
    </div>

    <!-- Blog Grid -->
    <div id="blogContainer" class="loading">جاري التحميل...</div>
</div>

<!-- Add/Edit Post Modal -->
<div id="postModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle"><i class="fas fa-plus"></i> مقال جديد</h3>
        <div class="form-row">
            <div>
                <label>العنوان (عربي) *</label>
                <input type="text" id="postTitleAr" placeholder="عنوان المقال">
            </div>
            <div>
                <label>العنوان (English)</label>
                <input type="text" id="postTitleEn" placeholder="Post title">

        <div class="form-row">
            <div>
                <label>التصنيف</label>
                <select id="postCategory">
                    <option value="general">عام</option>
                    <option value="news">أخبار</option>
                    <option value="products">منتجات</option>
                    <option value="tips">نصائح</option>

                <label>الحالة</label>
                <select id="postStatus">
                    <option value="draft">مسودة</option>
                    <option value="published">منشور</option>

            </div>
        </div>
        <div class="form-row">
            <div>
                <label>صورة الغلاف</label>

                <label>زر اختيار من المكتبة</label>

        <textarea id="postContentAr" rows="6" placeholder="محتوى المقال..."></textarea>

        <textarea id="postContentEn" rows="4" placeholder="Post content..."></textarea>
        <div class="modal-buttons">
            <button class="btn-outline" onclick="closeModal('postModal')">إلغاء</button>
            <button class="btn-primary" onclick="savePost()">حفظ</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // VERO BLOG - Full CRUD with API
    // ============================================================
    
    const API_URL = 'https://verobac-production.up.railway.app/api';
    let allPosts = [];
    let editingPostId = null;
    
    function getToken() { return localStorage.getItem('token'); }
    function getUser() { return JSON.parse(localStorage.getItem('user') || '{}'); }
    
    const token = getToken();
    const user = getUser();
    if (!token || !user) window.location.href = '../login.html';
    
    document.getElementById('userAvatar').innerText = (user.displayName || user.email?.charAt(0) || 'م')[0];
    
    // ============================================================
    // API Call
    // ============================================================
    async function apiCall(endpoint, options = {}) {
        const token = getToken();
        try {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                    ...options.headers
                }
            });
            
            if (response.status === 401) {
                localStorage.clear();
                window.location.href = '../login.html';
                return null;
            }
            
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            showToast('❌ خطأ في الاتصال بالخادم');
            return { success: false, error: error.message };
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // ============================================================
    // Load Posts
    // ============================================================
    async function loadPosts() {
        const result = await apiCall('/client/blog');
        
        if (result && result.success && result.posts) {
            allPosts = result.posts;
            updateStats();
            renderPosts();
        } else {
            allPosts = [];
            document.getElementById('blogContainer').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-blog"></i>
                    <p>لا توجد مقالات</p>
                    <button class="btn-primary" onclick="openAddPostModal()" style="margin-top: 16px;">
                        <i class="fas fa-plus"></i> أضف أول مقال
                    </button>
                </div>
            `;
        }
    }
    
    function updateStats() {
        const total = allPosts.length;
        const published = allPosts.filter(p => p.status === 'published').length;
        const drafts = allPosts.filter(p => p.status === 'draft').length;
        
        document.getElementById('totalPosts').innerText = total;
        document.getElementById('publishedPosts').innerText = published;
        document.getElementById('draftPosts').innerText = drafts;
    }
    
    // ============================================================
    // Render Posts
    // ============================================================
    function renderPosts() {
        const statusFilter = document.getElementById('statusFilter').value;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = allPosts;
        
        if (statusFilter !== 'all') {
            filtered = filtered.filter(p => p.status === statusFilter);
        }
        
        if (searchTerm) {
            filtered = filtered.filter(p => 
                p.title_ar?.toLowerCase().includes(searchTerm) || 
                p.title_en?.toLowerCase().includes(searchTerm)
            );
        }
        
        const container = document.getElementById('blogContainer');
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <p>لا توجد مقالات تطابق البحث</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = '<div class="blog-grid">';
        
        filtered.forEach(post => {
            const imageHtml = post.image 
                ? `<img src="${escapeHtml(post.image)}" alt="${escapeHtml(post.title_ar)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                : '';
            const iconHtml = !post.image ? '<i class="fas fa-image"></i>' : '';
            
            container.innerHTML += `
                <div class="blog-card">
                    <div class="blog-image">
                        ${imageHtml}
                        <div style="${post.image ? 'display: none;' : 'display: flex;'} align-items: center; justify-content: center; width: 100%; height: 100%;">
                            ${iconHtml}
                        </div>
                    </div>
                    <div class="blog-content">
                        <div class="blog-status ${post.status === 'published' ? 'status-published' : 'status-draft'}">
                            ${post.status === 'published' ? 'منشور' : 'مسودة'}
                        </div>
                        <div class="blog-title">${escapeHtml(post.title_ar || post.title_en)}</div>
                        <div class="blog-meta">
                            <span><i class="fas fa-calendar"></i> ${new Date(post.date || post.createdAt).toLocaleDateString('ar')}</span>
                            <span><i class="fas fa-tag"></i> ${getCategoryLabel(post.category)}</span>
                        </div>
                        <div class="blog-excerpt">${escapeHtml(post.content_ar?.substring(0, 120) || post.content_en?.substring(0, 120))}${(post.content_ar?.length > 120 || post.content_en?.length > 120) ? '...' : ''}</div>
                        <div class="blog-actions">
                            <button class="btn-warning" onclick="editPost('${post.id}')">
                                <i class="fas fa-edit"></i> تعديل
                            </button>
                            <button class="btn-danger" onclick="deletePost('${post.id}')">
                                <i class="fas fa-trash"></i> حذف
                            </button>
                            ${post.status !== 'published' ? `
                                <button class="btn-primary" onclick="publishPost('${post.id}')">
                                    <i class="fas fa-globe"></i> نشر
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML += '</div>';
    }
    
    function getCategoryLabel(category) {
        const categories = {
            'general': 'عام',
            'news': 'أخبار',
            'products': 'منتجات',
            'tips': 'نصائح'
        };
        return categories[category] || 'عام';
    }
    
    function filterPosts() {
        renderPosts();
    }
    
    // ============================================================
    // Post CRUD
    // ============================================================
    function openAddPostModal() {
        editingPostId = null;
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus"></i> مقال جديد';
        document.getElementById('postTitleAr').value = '';
        document.getElementById('postTitleEn').value = '';
        document.getElementById('postCategory').value = 'general';
        document.getElementById('postStatus').value = 'draft';
        document.getElementById('postImage').value = '';
        document.getElementById('postContentAr').value = '';
        document.getElementById('postContentEn').value = '';
        document.getElementById('postModal').style.display = 'flex';
    }
    
    function editPost(id) {
        const post = allPosts.find(p => p.id === id);
        if (!post) return;
        
        editingPostId = id;
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل مقال';
        document.getElementById('postTitleAr').value = post.title_ar || '';
        document.getElementById('postTitleEn').value = post.title_en || '';
        document.getElementById('postCategory').value = post.category || 'general';
        document.getElementById('postStatus').value = post.status || 'draft';
        document.getElementById('postImage').value = post.image || '';
        document.getElementById('postContentAr').value = post.content_ar || '';
        document.getElementById('postContentEn').value = post.content_en || '';
        document.getElementById('postModal').style.display = 'flex';
    }
    
    async function savePost() {
        const title_ar = document.getElementById('postTitleAr').value;
        if (!title_ar) {
            showToast('❌ الرجاء إدخال عنوان المقال');
            return;
        }
        
        const postData = {
            title_ar: title_ar,
            title_en: document.getElementById('postTitleEn').value,
            category: document.getElementById('postCategory').value,
            status: document.getElementById('postStatus').value,
            image: document.getElementById('postImage').value,
            content_ar: document.getElementById('postContentAr').value,
            content_en: document.getElementById('postContentEn').value
        };
        
        let result;
        if (editingPostId) {
            result = await apiCall(`/client/blog/${editingPostId}`, {
                method: 'PUT',
                body: JSON.stringify(postData)
            });
        } else {
            result = await apiCall('/client/blog', {
                method: 'POST',
                body: JSON.stringify(postData)
            });
        }
        
        if (result && result.success) {
            closeModal('postModal');
            loadPosts();
            showToast(editingPostId ? '✅ تم تحديث المقال' : '✅ تم إضافة المقال');
        } else {
            showToast('❌ فشل الحفظ: ' + (result?.error || 'خطأ غير معروف'));
        }
    }
    
    async function deletePost(id) {
        if (confirm('هل أنت متأكد من حذف هذا المقال؟')) {
            const result = await apiCall(`/client/blog/${id}`, { method: 'DELETE' });
            if (result && result.success) {
                loadPosts();
                showToast('✅ تم حذف المقال');
            } else {
                showToast('❌ فشل الحذف');
            }
        }
    }
    
    async function publishPost(id) {
        const result = await apiCall(`/client/blog/${id}/publish`, { method: 'POST' });
        if (result && result.success) {
            loadPosts();
            showToast('✅ تم نشر المقال');
        } else {
            showToast('❌ فشل النشر');
        }
    }
    
    function openMediaLibrary() {
        window.open('media.html', '_blank');
        showToast('📁 اختر صورة من مكتبة الوسائط ثم انسخ الرابط');
    }
    
    // ============================================================
    // Helper Functions
    // ============================================================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = '../login.html';
    }
    
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
        }
    };
    
    // ============================================================
    // Initialize
    // ============================================================
    loadPosts();
    
    if (window.innerWidth <= 768) {
        document.querySelector('.toggle-sidebar').style.display = 'block';
    }
</script>
</body>
</html>
