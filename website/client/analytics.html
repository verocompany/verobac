<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإحصائيات | VERO</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e7c27a;
            --primary-dark: #d4a95c;
            --primary-light: #f5e6c8;
            --secondary: #69451a;
            --secondary-light: #8b5e2c;
            --cream: #fffaf6;
            --cream-dark: #f5ebe0;
            --white: #ffffff;
            --ivory: #fffff0;
            --beige: #f5f5dc;
            --text: #1a1a1a;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-gold: 0 4px 14px rgba(231, 194, 122, 0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--beige) 100%);
            color: var(--text);
            direction: rtl;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--white);
            border-left: 1px solid var(--border);
            z-index: 100;
            overflow-y: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
        }

        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-track { background: var(--border-light); }
        .sidebar::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .sidebar-header {
            padding: 28px 24px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--white), var(--ivory));
        }

        .sidebar-header img {
            height: 55px;
            margin-bottom: 12px;
            transition: transform 0.3s ease;
        }

        .sidebar-header img:hover { transform: scale(1.05); }

        .sidebar-header h3 {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-item {
            padding: 12px 24px;
            margin: 5px 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }

        .nav-item i { width: 24px; font-size: 1.1rem; }
        .nav-item:hover {
            background: var(--primary-light);
            color: var(--secondary);
            transform: translateX(-5px);
        }
        .nav-item.active {
            background: linear-gradient(135deg, var(--primary-light), var(--ivory));
            color: var(--secondary);
            border-right: 3px solid var(--primary);
            box-shadow: var(--shadow-gold);
        }

        /* Main Content */
        .main-content {
            margin-right: 280px;
            padding: 28px 36px;
            min-height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 16px 24px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .user-avatar:hover { transform: scale(1.05); }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .logout-btn:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-2px);
        }

        /* Period Selector */
        .period-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            background: var(--white);
            padding: 12px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border-light);
        }

        .period-btn {
            padding: 8px 24px;
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .period-btn:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .period-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--secondary);
            border-color: var(--primary);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
            text-align: center;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }

        .stat-icon {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--secondary);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        /* Chart Cards */
        .chart-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border-light);
            margin-bottom: 24px;
        }

        .chart-card h3 {
            margin-bottom: 20px;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        canvas {
            max-height: 280px;
            width: 100%;
        }

        /* Top Products */
        .top-products-list {
            margin-top: 16px;
        }

        .top-product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .top-product-item:last-child {
            border-bottom: none;
        }

        .top-product-rank {
            width: 30px;
            height: 30px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--secondary);
        }

        .top-product-name {
            flex: 1;
            margin-right: 12px;
            font-weight: 500;
        }

        .top-product-sales {
            color: var(--primary);
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--white);
            color: var(--text);
            padding: 14px 24px;
            border-radius: 40px;
            box-shadow: var(--shadow-lg);
            z-index: 1100;
            animation: slideInRight 0.3s ease;
            border-right: 4px solid var(--primary);
            font-weight: 500;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toggle-sidebar {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--secondary);
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
                z-index: 200;
            }
            .sidebar.open { transform: translateX(0); }
            .main-content {
                margin-right: 0;
                padding: 20px;
            }
            .toggle-sidebar { display: block; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-container { height: 250px; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="../verologo.png" alt="VERO" onerror="this.src='https://placehold.co/200x60/e7c27a/69451a?text=VERO'">
        <h3>VERO</h3>
    </div>
    <nav>
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-tachometer-alt"></i> الرئيسية</div>
        <div class="nav-item" onclick="window.location.href='products.html'"><i class="fas fa-box"></i> المنتجات</div>
        <div class="nav-item" onclick="window.location.href='orders.html'"><i class="fas fa-shopping-cart"></i> الطلبات</div>
        <div class="nav-item" onclick="window.location.href='media.html'"><i class="fas fa-folder-open"></i> مكتبة الوسائط</div>
        <div class="nav-item" onclick="window.location.href='blog.html'"><i class="fas fa-blog"></i> المدونة</div>
        <div class="nav-item" onclick="window.location.href='tickets.html'"><i class="fas fa-headset"></i> الدعم</div>
        <div class="nav-item" onclick="window.location.href='billing.html'"><i class="fas fa-credit-card"></i> الفواتير</div>
        <div class="nav-item active" onclick="window.location.href='analytics.html'"><i class="fas fa-chart-line"></i> الإحصائيات</div>
        <div class="nav-item" onclick="window.location.href='settings.html'"><i class="fas fa-cog"></i> الإعدادات</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</div>
    </nav>
</div>

<div class="main-content">
    <div class="top-bar">
        <button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1 class="page-title">الإحصائيات والتحليلات</h1>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar">م</div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <!-- Period Selector -->
    <div class="period-selector">
        <button class="period-btn active" data-period="week" onclick="changePeriod('week')">آخر 7 أيام</button>
        <button class="period-btn" data-period="month" onclick="changePeriod('month')">آخر 30 يوم</button>
        <button class="period-btn" data-period="year" onclick="changePeriod('year')">آخر 12 شهر</button>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value" id="totalVisitors">-</div><div class="stat-label">إجمالي الزوار</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-value" id="totalOrders">-</div><div class="stat-label">إجمالي الطلبات</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-dollar-sign"></i></div><div class="stat-value" id="totalRevenue">-</div><div class="stat-label">إجمالي الإيرادات</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-value" id="conversionRate">-</div><div class="stat-label">معدل التحويل</div></div>
    </div>

    <!-- Visitors Chart -->
    <div class="chart-card">
        <h3><i class="fas fa-chart-line"></i> حركة الزوار</h3>
        <div class="chart-container">
            <canvas id="visitorsChart"></canvas>
        </div>
    </div>

    <!-- Sales Chart -->
    <div class="chart-card">
        <h3><i class="fas fa-chart-bar"></i> المبيعات</h3>
        <div class="chart-container">
            <canvas id="salesChart"></canvas>
        </div>
    </div>

    <!-- Top Products -->
    <div class="chart-card">
        <h3><i class="fas fa-trophy"></i> أفضل المنتجات مبيعاً</h3>
        <div id="topProductsList" class="top-products-list"></div>
    </div>
</div>

<script>
    // ============================================================
    // VERO ANALYTICS - Full API Integration with Charts
    // ============================================================
    
    const API_URL = 'https://verobac-production.up.railway.app/api';
    let currentPeriod = 'week';
    let visitorsChart = null;
    let salesChart = null;
    
    function getToken() { return localStorage.getItem('token'); }
    function getUser() { return JSON.parse(localStorage.getItem('user') || '{}'); }
    
    const token = getToken();
    const user = getUser();
    if (!token || !user) window.location.href = '../login.html';
    
    document.getElementById('userAvatar').innerText = (user.displayName || user.email?.charAt(0) || 'م')[0];
    
    // ============================================================
    // API Call
    // ============================================================
    async function apiCall(endpoint, options = {}) {
        const token = getToken();
        try {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                    ...options.headers
                }
            });
            
            if (response.status === 401) {
                localStorage.clear();
                window.location.href = '../login.html';
                return null;
            }
            
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            return { success: false, error: error.message };
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // ============================================================
    // Load Analytics
    // ============================================================
    async function loadAnalytics() {
        const result = await apiCall(`/client/analytics?period=${currentPeriod}`);
        
        if (result && result.success) {
            // Update stats
            document.getElementById('totalVisitors').innerText = (result.totalVisitors || 0).toLocaleString();
            document.getElementById('totalOrders').innerText = (result.totalOrders || 0).toLocaleString();
            document.getElementById('totalRevenue').innerText = (result.totalRevenue || 0).toLocaleString() + ' درهم';
            document.getElementById('conversionRate').innerText = (result.conversionRate || 0) + '%';
            
            // Update visitors chart
            if (visitorsChart) visitorsChart.destroy();
            const visitorsCtx = document.getElementById('visitorsChart').getContext('2d');
            visitorsChart = new Chart(visitorsCtx, {
                type: 'line',
                data: {
                    labels: result.visitorsLabels || ['أحد', 'إثنين', 'ثلاثاء', 'أربعاء', 'خميس', 'جمعة', 'سبت'],
                    datasets: [{
                        label: 'الزوار',
                        data: result.visitorsData || [0, 0, 0, 0, 0, 0, 0],
                        borderColor: '#e7c27a',
                        backgroundColor: 'rgba(231, 194, 122, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#69451a',
                        pointBorderColor: '#e7c27a',
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { font: { family: 'Cairo', size: 12 } } },
                        tooltip: { bodyFont: { family: 'Cairo' } }
                    }
                }
            });
            
            // Update sales chart
            if (salesChart) salesChart.destroy();
            const salesCtx = document.getElementById('salesChart').getContext('2d');
            salesChart = new Chart(salesCtx, {
                type: 'bar',
                data: {
                    labels: result.salesLabels || ['أحد', 'إثنين', 'ثلاثاء', 'أربعاء', 'خميس', 'جمعة', 'سبت'],
                    datasets: [{
                        label: 'المبيعات (درهم)',
                        data: result.salesData || [0, 0, 0, 0, 0, 0, 0],
                        backgroundColor: '#e7c27a',
                        borderRadius: 8,
                        barPercentage: 0.7,
                        categoryPercentage: 0.8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { font: { family: 'Cairo', size: 12 } } },
                        tooltip: { 
                            callbacks: {
                                label: function(context) {
                                    return context.raw.toLocaleString() + ' درهم';
                                }
                            }
                        }
                    }
                }
            });
            
            // Update top products
            if (result.topProducts && result.topProducts.length > 0) {
                const container = document.getElementById('topProductsList');
                container.innerHTML = '';
                result.topProducts.forEach((product, index) => {
                    container.innerHTML += `
                        <div class="top-product-item">
                            <div class="top-product-rank">${index + 1}</div>
                            <div class="top-product-name">${escapeHtml(product.name)}</div>
                            <div class="top-product-sales">${product.quantity} قطعة</div>
                        </div>
                    `;
                });
            } else {
                document.getElementById('topProductsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-chart-simple"></i>
                        <p>لا توجد بيانات كافية لعرض أفضل المنتجات</p>
                    </div>
                `;
            }
        } else {
            // Fallback mock data if API fails
            loadMockData();
        }
    }
    
    // ============================================================
    // Mock Data (Fallback)
    // ============================================================
    function loadMockData() {
        const mockData = {
            week: {
                totalVisitors: 2450, totalOrders: 128, totalRevenue: 45230, conversionRate: 5.2,
                visitorsLabels: ['أحد', 'إثنين', 'ثلاثاء', 'أربعاء', 'خميس', 'جمعة', 'سبت'],
                visitorsData: [280, 320, 350, 380, 420, 450, 250],
                salesLabels: ['أحد', 'إثنين', 'ثلاثاء', 'أربعاء', 'خميس', 'جمعة', 'سبت'],
                salesData: [5200, 6100, 6800, 7200, 8500, 9100, 3300],
                topProducts: [
                    { name: 'منتج 1', quantity: 45 },
                    { name: 'منتج 2', quantity: 32 },
                    { name: 'منتج 3', quantity: 28 }
                ]
            },
            month: {
                totalVisitors: 10200, totalOrders: 485, totalRevenue: 185000, conversionRate: 4.8,
                visitorsLabels: ['أسبوع 1', 'أسبوع 2', 'أسبوع 3', 'أسبوع 4'],
                visitorsData: [2200, 2450, 2680, 2870],
                salesLabels: ['أسبوع 1', 'أسبوع 2', 'أسبوع 3', 'أسبوع 4'],
                salesData: [38500, 42800, 46500, 51200],
                topProducts: [
                    { name: 'منتج 1', quantity: 120 },
                    { name: 'منتج 2', quantity: 95 },
                    { name: 'منتج 3', quantity: 78 }
                ]
            },
            year: {
                totalVisitors: 125000, totalOrders: 5840, totalRevenue: 2240000, conversionRate: 4.7,
                visitorsLabels: ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'],
                visitorsData: [8500, 9200, 10100, 11200, 11800, 12500, 13200, 12800, 11900, 10500, 9800, 9100],
                salesLabels: ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'],
                salesData: [152000, 168000, 185000, 198000, 205000, 212000, 218000, 205000, 195000, 178000, 165000, 158000],
                topProducts: [
                    { name: 'منتج 1', quantity: 520 },
                    { name: 'منتج 2', quantity: 445 },
                    { name: 'منتج 3', quantity: 380 }
                ]
            }
        };
        
        const data = mockData[currentPeriod];
        
        document.getElementById('totalVisitors').innerText = data.totalVisitors.toLocaleString();
        document.getElementById('totalOrders').innerText = data.totalOrders.toLocaleString();
        document.getElementById('totalRevenue').innerText = data.totalRevenue.toLocaleString() + ' درهم';
        document.getElementById('conversionRate').innerText = data.conversionRate + '%';
        
        if (visitorsChart) visitorsChart.destroy();
        const visitorsCtx = document.getElementById('visitorsChart').getContext('2d');
        visitorsChart = new Chart(visitorsCtx, {
            type: 'line',
            data: {
                labels: data.visitorsLabels,
                datasets: [{ label: 'الزوار', data: data.visitorsData, borderColor: '#e7c27a', backgroundColor: 'rgba(231, 194, 122, 0.1)', fill: true, tension: 0.4 }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
        
        if (salesChart) salesChart.destroy();
        const salesCtx = document.getElementById('salesChart').getContext('2d');
        salesChart = new Chart(salesCtx, {
            type: 'bar',
            data: {
                labels: data.salesLabels,
                datasets: [{ label: 'المبيعات (درهم)', data: data.salesData, backgroundColor: '#e7c27a', borderRadius: 8 }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
        
        const container = document.getElementById('topProductsList');
        container.innerHTML = '';
        data.topProducts.forEach((product, index) => {
            container.innerHTML += `
                <div class="top-product-item">
                    <div class="top-product-rank">${index + 1}</div>
                    <div class="top-product-name">${escapeHtml(product.name)}</div>
                    <div class="top-product-sales">${product.quantity} قطعة</div>
                </div>
            `;
        });
    }
    
    // ============================================================
    // Change Period
    // ============================================================
    function changePeriod(period) {
        currentPeriod = period;
        document.querySelectorAll('.period-btn').forEach(btn => {
            if (btn.dataset.period === period) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        loadAnalytics();
    }
    
    // ============================================================
    // Helper Functions
    // ============================================================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = '../login.html';
    }
    
    // ============================================================
    // Initialize
    // ============================================================
    loadAnalytics();
    
    if (window.innerWidth <= 768) {
        document.querySelector('.toggle-sidebar').style.display = 'block';
    }
</script>
</body>
</html>
