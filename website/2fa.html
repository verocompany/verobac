<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق بخطوتين | VERO</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #e7c27a;
            --primary-dark: #d4a95c;
            --secondary: #69451a;
            --bg: #fffaf6;
            --panel: #ffffff;
            --text: #1a1a1a;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --radius: 24px;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fffaf6 0%, #f5ebe0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 480px; width: 100%; }
        .card {
            background: var(--panel); border-radius: 32px; padding: 48px 40px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1); text-align: center;
        }
        .logo-img { height: 60px; margin-bottom: 24px; }
        .title { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
        .code-inputs { display: flex; gap: 12px; justify-content: center; margin-bottom: 32px; }
        .code-input {
            width: 60px; height: 70px; text-align: center; font-size: 28px; font-weight: 700;
            border: 2px solid var(--border); border-radius: 16px; background: var(--bg);
            font-family: monospace;
        }
        .code-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(231,194,122,0.2); }
        .btn {
            width: 100%; padding: 14px; border-radius: 14px; font-weight: 600;
            font-size: 16px; cursor: pointer; border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--secondary); margin-bottom: 20px;
        }
        .resend-link { color: var(--primary); text-decoration: none; font-size: 14px; cursor: pointer; }
        .error-message {
            background: rgba(239,68,68,0.1); color: #dc2626; padding: 12px;
            border-radius: 12px; margin-bottom: 20px; font-size: 14px; display: none;
        }
        @media (max-width: 480px) {
            .card { padding: 32px 24px; }
            .code-input { width: 45px; height: 55px; font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <img src="verologo.png" alt="VERO" class="logo-img">
        <h1 class="title">التحقق بخطوتين</h1>
        <p class="subtitle">أدخل رمز التحقق المرسل إلى بريدك الإلكتروني</p>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="code-inputs">
            <input type="text" maxlength="1" class="code-input" id="code1" onkeyup="moveToNext(this, 'code2')">
            <input type="text" maxlength="1" class="code-input" id="code2" onkeyup="moveToNext(this, 'code3')">
            <input type="text" maxlength="1" class="code-input" id="code3" onkeyup="moveToNext(this, 'code4')">
            <input type="text" maxlength="1" class="code-input" id="code4" onkeyup="moveToNext(this, 'code5')">
            <input type="text" maxlength="1" class="code-input" id="code5" onkeyup="moveToNext(this, 'code6')">
            <input type="text" maxlength="1" class="code-input" id="code6" onkeyup="moveToNext(this, null)">
        </div>
        
        <button class="btn" onclick="verifyCode()">تحقق</button>
        <a href="#" class="resend-link" onclick="resendCode()">إعادة إرسال الرمز</a>
    </div>
</div>

<script>
    // ✅ API رابط Railway
    const API_URL = 'https://verobac-production.up.railway.app/api';
    
    const sessionId = localStorage.getItem('2fa_session_id');
    const email = localStorage.getItem('2fa_email');
    
    if (!sessionId) { window.location.href = 'login.html'; }
    
    function moveToNext(current, nextId) {
        if (current.value.length === 1 && nextId) { document.getElementById(nextId).focus(); }
    }
    
    async function verifyCode() {
        const code = [1,2,3,4,5,6].map(i => document.getElementById(`code${i}`).value).join('');
        if (code.length !== 6) { showError('الرجاء إدخال رمز التحقق الكامل'); return; }
        
        try {
            const response = await fetch(`${API_URL}/auth/verify-2fa`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, code })
            });
            const data = await response.json();
            
            if (data.success) {
                localStorage.setItem('token', data.accessToken);
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.removeItem('2fa_session_id');
                localStorage.removeItem('2fa_email');
                
                if (data.user.role === 'super_admin' || data.user.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else if (data.user.role === 'client') {
                    window.location.href = 'client/dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                showError('رمز التحقق غير صحيح');
            }
        } catch (error) {
            showError('حدث خطأ. حاول مرة أخرى');
        }
    }
    
    async function resendCode() {
        try {
            const response = await fetch(`${API_URL}/auth/resend-2fa`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            if (response.ok) { alert('تم إرسال رمز جديد إلى بريدك الإلكتروني'); }
            else { alert('حدث خطأ. حاول مرة أخرى'); }
        } catch (error) { alert('حدث خطأ. حاول مرة أخرى'); }
    }
    
    function showError(msg) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.innerText = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 3000);
    }
</script>
</body>
</html>
