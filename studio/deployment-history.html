<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل النشر - VERO Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .deployment-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .deployment-stat-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .deployment-stat-value { font-size: 28px; font-weight: 800; color: var(--gold-dark); }
        .deployment-table {
            width: 100%; background: var(--white); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-sm);
        }
        .deployment-table th, .deployment-table td { padding: 16px; text-align: right; border-bottom: 1px solid var(--gray-light); }
        .deployment-table th { background: var(--cream); font-weight: 600; }
        .deployment-row:hover { background: var(--gold-light); }
        .deployment-status {
            display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 40px; font-size: 12px;
        }
        .rollback-btn {
            background: none; border: 1px solid var(--warning); color: var(--warning); padding: 4px 12px; border-radius: 20px; cursor: pointer;
        }
        .filter-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-input { padding: 10px 16px; border: 1px solid var(--gray-light); border-radius: 40px; font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body>
<div class="page-content">
    <h3><i class="fas fa-history"></i> سجل عمليات النشر</h3>
    
    <div class="deployment-stats">
        <div class="deployment-stat-card"><div class="deployment-stat-value" id="totalDeployments">0</div><div>إجمالي النشر</div></div>
        <div class="deployment-stat-card"><div class="deployment-stat-value" id="successCount">0</div><div>ناجح</div></div>
        <div class="deployment-stat-card"><div class="deployment-stat-value" id="failedCount">0</div><div>فاشل</div></div>
        <div class="deployment-stat-card"><div class="deployment-stat-value" id="rollbackCount">0</div><div>استرجاع</div></div>
    </div>
    
    <div class="filter-bar">
        <select id="statusFilter" class="filter-input" onchange="filterDeployments()">
            <option value="all">جميع الحالات</option><option value="completed">ناجح</option><option value="failed">فاشل</option>
        </select>
        <select id="projectFilter" class="filter-input" onchange="filterDeployments()"><option value="all">جميع المشاريع</option></select>
        <input type="date" id="dateFilter" class="filter-input" onchange="filterDeployments()">
        <button class="btn-secondary" onclick="clearFilters()"><i class="fas fa-eraser"></i> مسح</button>
        <button class="btn-primary" onclick="exportDeployments()"><i class="fas fa-download"></i> تصدير</button>
    </div>
    
    <div style="overflow-x: auto;">
        <table class="deployment-table" id="deploymentsTable">
            <thead><tr><th>التاريخ</th><th>المشروع</th><th>العميل</th><th>الحالة</th><th>المدة</th><th>إجراءات</th></tr></thead>
            <tbody id="deploymentsBody"><tr><td colspan="6" style="text-align: center;">جاري التحميل...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'https://verobac-production.up.railway.app/api';
    let deployments = [];
    let projects = [];
    
    async function loadDeployments() {
        try {
            const response = await fetch(`${API_URL}/deploy`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const data = await response.json();
            if (data.success) {
                deployments = data.deployments || [];
                updateStats();
                renderDeployments();
            }
        } catch(e) { console.error(e); }
    }
    
    async function loadProjects() {
        try {
            const response = await fetch(`${API_URL}/projects`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const data = await response.json();
            if (data.success) {
                projects = data.projects || [];
                const select = document.getElementById('projectFilter');
                select.innerHTML = '<option value="all">جميع المشاريع</option>' + 
                    projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            }
        } catch(e) { console.error(e); }
    }
    
    function updateStats() {
        const total = deployments.length;
        const success = deployments.filter(d => d.status === 'completed').length;
        const failed = deployments.filter(d => d.status === 'failed').length;
        document.getElementById('totalDeployments').innerHTML = total;
        document.getElementById('successCount').innerHTML = success;
        document.getElementById('failedCount').innerHTML = failed;
        document.getElementById('rollbackCount').innerHTML = total - success - failed;
    }
    
    function renderDeployments() {
        const statusFilter = document.getElementById('statusFilter').value;
        const projectFilter = document.getElementById('projectFilter').value;
        const dateFilter = document.getElementById('dateFilter').value;
        
        let filtered = [...deployments];
        if (statusFilter !== 'all') filtered = filtered.filter(d => d.status === statusFilter);
        if (projectFilter !== 'all') filtered = filtered.filter(d => d.projectId === projectFilter);
        if (dateFilter) filtered = filtered.filter(d => d.deployedAt?.startsWith(dateFilter));
        
        const tbody = document.getElementById('deploymentsBody');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">لا توجد عمليات نشر</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map(d => `
            <tr class="deployment-row">
                <td>${d.deployedAt ? new Date(d.deployedAt).toLocaleString('ar') : '-'}</td>
                <td><strong>${d.projectName || d.projectId?.slice(0,8)}</strong></td>
                <td>${d.clientEmail || '-'}</td>
                <td><span class="deployment-status" style="background: ${d.status === 'completed' ? '#22c55e20' : '#ef444420'}; color: ${d.status === 'completed' ? '#22c55e' : '#ef4444'};">${d.status === 'completed' ? '✓ ناجح' : '✗ فاشل'}</span></td>
                <td>${d.duration || '-'}</td>
                <td><button class="rollback-btn" onclick="viewDetails('${d.id}')"><i class="fas fa-info-circle"></i> تفاصيل</button></td>
            </tr>
        `).join('');
    }
    
    function viewDetails(id) {
        const deployment = deployments.find(d => d.id == id);
        if (deployment) alert(`📋 تفاصيل النشر\n\nالحالة: ${deployment.status}\nالعميل: ${deployment.clientEmail}\nالتاريخ: ${new Date(deployment.deployedAt).toLocaleString()}\nالخطأ: ${deployment.error || 'لا يوجد'}`);
    }
    
    function filterDeployments() { renderDeployments(); }
    function clearFilters() {
        document.getElementById('statusFilter').value = 'all';
        document.getElementById('projectFilter').value = 'all';
        document.getElementById('dateFilter').value = '';
        renderDeployments();
    }
    
    function exportDeployments() {
        const data = deployments.map(d => ({
            التاريخ: d.deployedAt ? new Date(d.deployedAt).toLocaleString() : '-',
            المشروع: d.projectId,
            العميل: d.clientEmail,
            الحالة: d.status,
            الخطأ: d.error || '-'
        }));
        const csv = convertToCSV(data);
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.setAttribute('download', `deployments_${new Date().toISOString().split('T')[0]}.csv`);
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('📥 تم تصدير السجل');
    }
    
    function convertToCSV(data) {
        if (!data.length) return '';
        const headers = Object.keys(data[0]);
        const rows = data.map(obj => headers.map(h => JSON.stringify(obj[h] || '')).join(','));
        return [headers.join(','), ...rows].join('\n');
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    loadProjects();
    loadDeployments();
</script>
</body>
</html>
