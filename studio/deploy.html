<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy - VERO Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0A0E1A;
            --panel: #111827;
            --card: #1A2233;
            --card-border: #1E2D42;
            --cyan: #00D4FF;
            --purple: #7C3AED;
            --green: #10B981;
            --amber: #F59E0B;
            --red: #EF4444;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #4A5568;
            --topbar-h: 48px;
            --sidebar-w: 220px;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--sans); background: var(--bg); color: var(--text-primary); font-size: 13px; overflow: hidden; direction: rtl; }
        
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h); background: var(--panel); border-bottom: 1px solid var(--card-border); display: flex; align-items: center; padding: 0 16px; z-index: 100; gap: 16px; }
        .topbar-brand { display: flex; align-items: center; gap: 10px; min-width: var(--sidebar-w); }
        .brand-name { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.05em; color: var(--text-primary); }
        .brand-env { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: var(--cyan); background: rgba(0,212,255,0.1); padding: 2px 6px; border-radius: 3px; border: 1px solid rgba(0,212,255,0.2); }
        .topbar-status { display: flex; align-items: center; gap: 8px; flex: 1; }
        .status-pill { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--text-secondary); padding: 3px 8px; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); }
        .status-pill.online { color: var(--green); border-color: rgba(16,185,129,0.2); }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .user-chip { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; font-family: var(--mono); }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 12px; font-weight: 500; color: var(--text-primary); }
        .user-role { font-size: 10px; color: var(--text-secondary); }

        .sidebar { position: fixed; top: var(--topbar-h); right: 0; width: var(--sidebar-w); height: calc(100vh - var(--topbar-h)); background: var(--panel); border-left: 1px solid var(--card-border); overflow-y: auto; z-index: 90; }
        .sidebar-nav { padding: 12px 0; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; border-right: 2px solid transparent; font-size: 12px; }
        .nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); border-right-color: rgba(255,255,255,0.1); }
        .nav-item.active { color: var(--cyan); background: rgba(0,212,255,0.06); border-right-color: var(--cyan); }
        .nav-label { font-size: 12px; }
        .nav-divider { height: 1px; background: var(--card-border); margin: 8px 16px; }

        .main { margin-right: var(--sidebar-w); margin-top: var(--topbar-h); height: calc(100vh - var(--topbar-h)); overflow-y: auto; padding: 24px; }
        .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
        .page-title { font-size: 22px; font-weight: 600; color: var(--text-primary); }
        .page-subtitle { font-size: 12px; color: var(--text-secondary); }

        .deploy-container { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 1000px) { .deploy-container { grid-template-columns: 1fr; } }
        
        .deploy-form { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 24px; }
        .deploy-history { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 24px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--card-border); border-radius: 6px; color: var(--text-primary); font-size: 12px; }
        .form-group input:focus { outline: none; border-color: var(--cyan); }
        
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
        .btn-primary { background: var(--cyan); color: #000; width: 100%; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary { background: var(--card); color: var(--text-secondary); border-color: var(--card-border); }
        
        .deployment-log { background: var(--bg); border-radius: 8px; padding: 16px; margin-top: 16px; font-family: var(--mono); font-size: 11px; max-height: 300px; overflow-y: auto; }
        .log-line { padding: 4px 0; border-bottom: 1px solid var(--card-border); color: var(--text-secondary); }
        .log-line.success { color: var(--green); }
        .log-line.error { color: var(--red); }
        
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--card-border); }
        .history-item:hover { background: rgba(0,212,255,0.03); }
        
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600; }
        .badge-success { background: rgba(16,185,129,0.15); color: var(--green); }
        .badge-danger { background: rgba(239,68,68,0.15); color: var(--red); }
        
        .progress-bar { height: 4px; background: var(--card-border); border-radius: 2px; margin: 16px 0; overflow: hidden; display: none; }
        .progress-fill { width: 0%; height: 100%; background: var(--cyan); transition: width 0.3s; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; background: var(--card); border: 1px solid var(--cyan); border-radius: 8px; color: var(--cyan); z-index: 1000; animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2A3A50; border-radius: 3px; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#00D4FF"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#7C3AED"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#7C3AED"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5" fill="#00D4FF" opacity="0.5"/>
        </svg>
        <span class="brand-name">VERO Studio</span>
        <span class="brand-env">PRODUCTION</span>
    </div>
    <div class="topbar-status">
        <div class="status-pill online"><span class="dot"></span>API</div>
        <div class="status-pill online"><span class="dot"></span>Deploy</div>
    </div>
    <div class="topbar-right">
        <div class="user-chip" onclick="logout()">
            <div class="user-avatar" id="userAvatar">SA</div>
            <div class="user-info">
                <span class="user-name" id="userName">Super Admin</span>
                <span class="user-role" id="userRole">super_admin</span>
            </div>
        </div>
    </div>
</div>

<div class="sidebar">
    <nav class="sidebar-nav">
        <a class="nav-item" onclick="navigate('dashboard')"><i class="fas fa-tachometer-alt"></i><span class="nav-label">Dashboard</span></a>
        <a class="nav-item" onclick="navigate('projects')"><i class="fas fa-folder-open"></i><span class="nav-label">Projects</span></a>
        <a class="nav-item" onclick="navigate('clients')"><i class="fas fa-users"></i><span class="nav-label">Clients</span></a>
        <a class="nav-item" onclick="navigate('templates')"><i class="fas fa-palette"></i><span class="nav-label">Templates</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item active" onclick="navigate('deploy')"><i class="fas fa-rocket"></i><span class="nav-label">Deploy</span></a>
        <a class="nav-item" onclick="navigate('domains')"><i class="fas fa-globe"></i><span class="nav-label">Domains</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="navigate('team')"><i class="fas fa-users-cog"></i><span class="nav-label">Team</span></a>
        <a class="nav-item" onclick="navigate('settings')"><i class="fas fa-cog"></i><span class="nav-label">Settings</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="nav-label">Logout</span></a>
    </nav>
</div>

<main class="main">
    <div class="page-header">
        <div>
            <h1 class="page-title">Deployment Center</h1>
            <p class="page-subtitle">Deploy websites to production</p>
        </div>
    </div>

    <div class="deploy-container">
        <div class="deploy-form">
            <h3 style="margin-bottom: 20px;"><i class="fas fa-rocket"></i> New Deployment</h3>
            <div class="form-group">
                <label>Select Project</label>
                <select id="projectSelect">
                    <option value="">-- Select a project --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Client Name</label>
                <input type="text" id="clientName" placeholder="Client full name">
            </div>
            <div class="form-group">
                <label>Client Email</label>
                <input type="email" id="clientEmail" placeholder="client@example.com">
            </div>
            <div class="form-group">
                <label>Custom Domain (Optional)</label>
                <input type="text" id="domain" placeholder="example.com">
            </div>
            <div class="form-group">
                <label>Hosting Plan</label>
                <select id="plan">
                    <option value="essential">Essential (300 AED/month)</option>
                    <option value="business" selected>Business (500 AED/month)</option>
                    <option value="premium">Premium (700 AED/month)</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="startDeploy()"><i class="fas fa-rocket"></i> Deploy Website</button>
            
            <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="deployLog" class="deployment-log" style="display: none;"></div>
            <div id="deployResult" style="margin-top: 16px;"></div>
        </div>
        
        <div class="deploy-history">
            <h3 style="margin-bottom: 20px;"><i class="fas fa-history"></i> Deployment History</h3>
            <div id="historyList">Loading...</div>
        </div>
    </div>
</main>

<script>
    const API_URL = 'https://verobac-production.up.railway.app/api';
    let projects = [];
    
    function getToken() { return localStorage.getItem('token'); }
    function getUser() { return JSON.parse(localStorage.getItem('user') || '{}'); }
    
    const user = getUser();
    if (!getToken() || !user) window.location.href = 'login.html';
    
    document.getElementById('userName').innerText = user.displayName || user.email || 'Admin';
    document.getElementById('userAvatar').innerText = (user.displayName || user.email || 'A')[0].toUpperCase();
    document.getElementById('userRole').innerText = user.role === 'super_admin' ? 'Super Admin' : user.role;
    
    function navigate(page) { window.location.href = `${page}.html`; }
    function logout() { localStorage.clear(); sessionStorage.clear(); window.location.href = 'login.html'; }
    
    async function apiCall(endpoint, options = {}) {
        const token = getToken();
        try {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(token && { 'Authorization': `Bearer ${token}` }), ...options.headers }
            });
            if (response.status === 401) { logout(); return null; }
            return await response.json();
        } catch (error) { return { success: false, error: error.message }; }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function loadProjects() {
        const result = await apiCall('/projects');
        if (result && result.success && result.projects) {
            projects = result.projects;
            const select = document.getElementById('projectSelect');
            select.innerHTML = '<option value="">-- Select a project --</option>' + 
                projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }
    }
    
    async function loadDeployments() {
        const result = await apiCall('/deploy');
        const container = document.getElementById('historyList');
        if (result && result.success && result.deployments && result.deployments.length > 0) {
            container.innerHTML = result.deployments.map(d => `
                <div class="history-item">
                    <div><strong>${d.projectName || d.projectId?.slice(0, 8)}</strong><br><small>${new Date(d.deployedAt).toLocaleString()}</small></div>
                    <div><span class="badge badge-success">${d.status || 'Completed'}</span></div>
                    <div><small>${d.clientEmail || '-'}</small></div>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<div class="empty-state">No deployments yet</div>';
        }
    }
    
    function addLog(message, type = 'info') {
        const logDiv = document.getElementById('deployLog');
        logDiv.style.display = 'block';
        const logLine = document.createElement('div');
        logLine.className = `log-line ${type === 'success' ? 'success' : (type === 'error' ? 'error' : '')}`;
        logLine.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
        logDiv.appendChild(logLine);
        logDiv.scrollTop = logDiv.scrollHeight;
    }
    
    async function startDeploy() {
        const projectId = document.getElementById('projectSelect').value;
        const clientName = document.getElementById('clientName').value;
        const clientEmail = document.getElementById('clientEmail').value;
        const domain = document.getElementById('domain').value;
        const plan = document.getElementById('plan').value;
        
        if (!projectId) { showToast('❌ Select a project'); return; }
        if (!clientName || !clientEmail) { showToast('❌ Enter client details'); return; }
        
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const deployLog = document.getElementById('deployLog');
        const resultDiv = document.getElementById('deployResult');
        
        progressBar.style.display = 'block';
        deployLog.innerHTML = '';
        resultDiv.innerHTML = '';
        addLog('Starting deployment process...');
        
        const steps = ['Validating project', 'Building files', 'Uploading to R2', 'Configuring domain', 'Setting up SSL', 'Creating client account', 'Sending email notification'];
        
        for (let i = 0; i < steps.length; i++) {
            progressFill.style.width = `${((i + 1) / steps.length) * 100}%`;
            addLog(`🔄 ${steps[i]}...`);
            await new Promise(r => setTimeout(r, 500));
        }
        
        try {
            const result = await apiCall('/deploy', {
                method: 'POST',
                body: JSON.stringify({ projectId, clientName, clientEmail, domain, plan })
            });
            
            if (result && result.success) {
                progressFill.style.width = '100%';
                addLog('✅ Deployment completed successfully!', 'success');
                resultDiv.innerHTML = `
                    <div style="background: rgba(16,185,129,0.1); border: 1px solid var(--green); border-radius: 8px; padding: 16px;">
                        <i class="fas fa-check-circle" style="color: var(--green);"></i>
                        <strong>Deployment Successful!</strong><br>
                        <small>Client: ${result.client?.email}</small><br>
                        <small>Password: ${result.client?.password}</small><br>
                        <small>Website: <a href="${result.client?.websiteUrl}" target="_blank" style="color: var(--cyan);">${result.client?.websiteUrl}</a></small>
                    </div>
                `;
                showToast('✅ Website deployed successfully!');
                loadDeployments();
            } else {
                addLog(`❌ Deployment failed: ${result?.error || 'Unknown error'}`, 'error');
                showToast('❌ Deployment failed');
            }
        } catch (error) {
            addLog(`❌ Error: ${error.message}`, 'error');
            showToast('❌ Deployment failed');
        }
        
        setTimeout(() => { progressBar.style.display = 'none'; }, 3000);
    }
    
    loadProjects();
    loadDeployments();
</script>
</body>
</html>
