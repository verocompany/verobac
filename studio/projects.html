<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - VERO Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0A0E1A;
            --panel: #111827;
            --card: #1A2233;
            --card-border: #1E2D42;
            --cyan: #00D4FF;
            --purple: #7C3AED;
            --green: #10B981;
            --amber: #F59E0B;
            --red: #EF4444;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #4A5568;
            --topbar-h: 48px;
            --sidebar-w: 220px;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.5;
            overflow: hidden;
            direction: rtl;
        }

        /* Top Bar */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--topbar-h);
            background: var(--panel);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            gap: 16px;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: var(--sidebar-w);
        }
        .brand-name {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-primary);
        }
        .brand-env {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--cyan);
            background: rgba(0,212,255,0.1);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid rgba(0,212,255,0.2);
        }

        .topbar-status {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .status-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-secondary);
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--card-border);
        }
        .status-pill.online { color: var(--green); border-color: rgba(16,185,129,0.2); }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .user-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: white;
            font-family: var(--mono);
        }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 12px; font-weight: 500; color: var(--text-primary); }
        .user-role { font-size: 10px; color: var(--text-secondary); }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: var(--topbar-h);
            right: 0;
            width: var(--sidebar-w);
            height: calc(100vh - var(--topbar-h));
            background: var(--panel);
            border-left: 1px solid var(--card-border);
            overflow-y: auto;
            z-index: 90;
        }
        .sidebar-nav { padding: 12px 0; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.15s;
            border-right: 2px solid transparent;
            font-size: 12px;
        }
        .nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); border-right-color: rgba(255,255,255,0.1); }
        .nav-item.active { color: var(--cyan); background: rgba(0,212,255,0.06); border-right-color: var(--cyan); }
        .nav-label { font-size: 12px; }
        .nav-divider { height: 1px; background: var(--card-border); margin: 8px 16px; }

        /* Main Content */
        .main {
            margin-right: var(--sidebar-w);
            margin-top: var(--topbar-h);
            height: calc(100vh - var(--topbar-h));
            overflow-y: auto;
            padding: 24px;
        }

        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .page-title { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
        .page-subtitle { font-size: 12px; color: var(--text-secondary); }

        /* Filters */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-select {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 12px;
            font-family: var(--sans);
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 5px 12px;
        }
        .search-box input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 12px;
            width: 200px;
        }
        .search-box input::placeholder { color: var(--text-muted); }

        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
        }
        .project-card:hover {
            border-color: var(--cyan);
            transform: translateY(-2px);
        }
        .project-header {
            padding: 16px;
            background: linear-gradient(135deg, rgba(0,212,255,0.05), transparent);
            border-bottom: 1px solid var(--card-border);
        }
        .project-name {
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--cyan);
            margin-bottom: 4px;
        }
        .project-meta {
            display: flex;
            gap: 12px;
            font-size: 10px;
            color: var(--text-muted);
        }
        .project-body {
            padding: 16px;
        }
        .project-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .status-draft { background: rgba(148,163,184,0.15); color: var(--text-secondary); }
        .status-progress { background: rgba(59,130,246,0.15); color: var(--blue); }
        .status-review { background: rgba(245,158,11,0.15); color: var(--amber); }
        .status-ready { background: rgba(124,58,237,0.15); color: var(--purple); }
        .status-published { background: rgba(16,185,129,0.15); color: var(--green); }

        .project-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: var(--cyan);
            color: #000;
        }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary {
            background: var(--card);
            color: var(--text-secondary);
            border-color: var(--card-border);
        }
        .btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }
        .btn-danger {
            background: rgba(239,68,68,0.15);
            color: var(--red);
            border-color: rgba(239,68,68,0.3);
        }
        .btn-danger:hover { background: var(--red); color: white; }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 48px; margin-bottom: 16px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-content {
            background: var(--panel);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            width: 400px;
            max-width: 90%;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            color: var(--text-primary);
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 16px;
            background: var(--card);
            border: 1px solid var(--cyan);
            border-radius: 8px;
            color: var(--cyan);
            z-index: 1000;
            animation: slideIn 0.2s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2A3A50; border-radius: 3px; }
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
    <div class="topbar-brand">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#00D4FF"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#7C3AED"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#7C3AED"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5" fill="#00D4FF" opacity="0.5"/>
        </svg>
        <span class="brand-name">VERO Studio</span>
        <span class="brand-env">PRODUCTION</span>
    </div>
    <div class="topbar-status">
        <div class="status-pill online"><span class="dot"></span>API</div>
        <div class="status-pill online"><span class="dot"></span>Firebase</div>
        <div class="status-pill online"><span class="dot"></span>R2</div>
    </div>
    <div class="topbar-right">
        <div class="user-chip" onclick="logout()">
            <div class="user-avatar" id="userAvatar">SA</div>
            <div class="user-info">
                <span class="user-name" id="userName">Super Admin</span>
                <span class="user-role" id="userRole">super_admin</span>
            </div>
        </div>
    </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
    <nav class="sidebar-nav">
        <a class="nav-item" onclick="navigate('dashboard')"><i class="fas fa-tachometer-alt"></i><span class="nav-label">Dashboard</span></a>
        <a class="nav-item active" onclick="navigate('projects')"><i class="fas fa-folder-open"></i><span class="nav-label">Projects</span></a>
        <a class="nav-item" onclick="navigate('clients')"><i class="fas fa-users"></i><span class="nav-label">Clients</span></a>
        <a class="nav-item" onclick="navigate('templates')"><i class="fas fa-palette"></i><span class="nav-label">Templates</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="navigate('deploy')"><i class="fas fa-rocket"></i><span class="nav-label">Deploy</span></a>
        <a class="nav-item" onclick="navigate('domains')"><i class="fas fa-globe"></i><span class="nav-label">Domains</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="navigate('team')"><i class="fas fa-users-cog"></i><span class="nav-label">Team</span></a>
        <a class="nav-item" onclick="navigate('settings')"><i class="fas fa-cog"></i><span class="nav-label">Settings</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="nav-label">Logout</span></a>
    </nav>
</div>

<!-- Main Content -->
<main class="main">
    <div class="page-header">
        <div>
            <h1 class="page-title">Projects</h1>
            <p class="page-subtitle">Manage all client website projects</p>
        </div>
        <button class="btn btn-primary" onclick="showCreateProjectModal()"><i class="fas fa-plus"></i> New Project</button>
    </div>

    <div class="filter-bar">
        <select id="statusFilter" class="filter-select" onchange="filterProjects()">
            <option value="all">All Statuses</option>
            <option value="draft">Draft</option>
            <option value="in-progress">In Progress</option>
            <option value="review">Review</option>
            <option value="ready">Ready for Deployment</option>
            <option value="published">Published</option>
        </select>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search projects..." oninput="filterProjects()">
        </div>
    </div>

    <div id="projectsGrid" class="projects-grid">
        <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Loading projects...</div>
    </div>
</main>

<!-- Create Project Modal -->
<div id="projectModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-plus-circle"></i> New Project</h3>
        <input type="text" id="projectName" placeholder="Project Name">
        <select id="projectClientId">
            <option value="">No Client</option>
        </select>
        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closeModal('projectModal')">Cancel</button>
            <button class="btn btn-primary" onclick="createProject()">Create</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // VERO STUDIO PROJECTS - Full API Integration
    // ============================================================
    
    const API_URL = 'https://verobac-production.up.railway.app/api';
    let projects = [];
    let clients = [];
    
    function getToken() { return localStorage.getItem('token'); }
    function getUser() { return JSON.parse(localStorage.getItem('user') || '{}'); }
    
    const token = getToken();
    const user = getUser();
    if (!token || !user) window.location.href = 'login.html';
    
    document.getElementById('userName').innerText = user.displayName || user.email || 'Admin';
    document.getElementById('userAvatar').innerText = (user.displayName || user.email || 'A')[0].toUpperCase();
    document.getElementById('userRole').innerText = user.role === 'super_admin' ? 'Super Admin' : user.role;
    
    function navigate(page) { window.location.href = `${page}.html`; }
    function logout() { localStorage.clear(); sessionStorage.clear(); window.location.href = 'login.html'; }
    
    async function apiCall(endpoint, options = {}) {
        const token = getToken();
        try {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                    ...options.headers
                }
            });
            if (response.status === 401) { logout(); return null; }
            return await response.json();
        } catch (error) {
            return { success: false, error: error.message };
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    // ============================================================
    // Load Projects
    // ============================================================
    async function loadProjects() {
        const result = await apiCall('/projects');
        if (result && result.success) {
            projects = result.projects || [];
            renderProjects();
        } else {
            projects = [];
            renderProjects();
        }
    }
    
    function getStatusClass(status) {
        const classes = {
            'draft': 'status-draft',
            'in-progress': 'status-progress',
            'review': 'status-review',
            'ready': 'status-ready',
            'published': 'status-published'
        };
        return classes[status] || 'status-draft';
    }
    
    function getStatusText(status) {
        const texts = {
            'draft': 'Draft',
            'in-progress': 'In Progress',
            'review': 'Review',
            'ready': 'Ready for Deployment',
            'published': 'Published'
        };
        return texts[status] || 'Draft';
    }
    
    function renderProjects() {
        const statusFilter = document.getElementById('statusFilter').value;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = [...projects];
        if (statusFilter !== 'all') {
            filtered = filtered.filter(p => p.status === statusFilter);
        }
        if (searchTerm) {
            filtered = filtered.filter(p => p.name?.toLowerCase().includes(searchTerm));
        }
        
        const container = document.getElementById('projectsGrid');
        
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i><p>No projects found</p><button class="btn btn-primary" onclick="showCreateProjectModal()">Create New Project</button></div>`;
            return;
        }
        
        container.innerHTML = filtered.map(p => `
            <div class="project-card" onclick="openProject('${p.id}')">
                <div class="project-header">
                    <div class="project-name">${escapeHtml(p.name)}</div>
                    <div class="project-meta">
                        <span><i class="far fa-calendar"></i> ${formatDate(p.createdAt)}</span>
                        <span><i class="fas fa-user"></i> ${p.createdBy?.slice(0, 8) || 'System'}</span>
                    </div>
                </div>
                <div class="project-body">
                    <div class="project-status ${getStatusClass(p.status)}">${getStatusText(p.status)}</div>
                    <div class="project-actions" onclick="event.stopPropagation()">
                        <button class="btn btn-secondary" onclick="editProject('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn btn-primary" onclick="openBuilder('${p.id}')"><i class="fas fa-code"></i> Build</button>
                        <button class="btn btn-danger" onclick="deleteProject('${p.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    function filterProjects() { renderProjects(); }
    
    // ============================================================
    // Create / Edit / Delete
    // ============================================================
    async function showCreateProjectModal() {
        await loadClientsForSelect();
        document.getElementById('projectModal').style.display = 'flex';
    }
    
    async function loadClientsForSelect() {
        const result = await apiCall('/clients');
        const select = document.getElementById('projectClientId');
        if (result && result.success && result.clients) {
            select.innerHTML = '<option value="">No Client</option>' + 
                result.clients.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
        }
    }
    
    async function createProject() {
        const name = document.getElementById('projectName').value;
        const clientId = document.getElementById('projectClientId').value;
        
        if (!name) {
            showToast('❌ Please enter project name');
            return;
        }
        
        const result = await apiCall('/projects', {
            method: 'POST',
            body: JSON.stringify({ name, clientId: clientId || null })
        });
        
        if (result && result.success) {
            closeModal('projectModal');
            document.getElementById('projectName').value = '';
            loadProjects();
            showToast('✅ Project created successfully');
        } else {
            showToast('❌ Failed to create project');
        }
    }
    
    function editProject(id) {
        const project = projects.find(p => p.id === id);
        if (!project) return;
        const newName = prompt('Edit project name:', project.name);
        if (newName && newName !== project.name) {
            apiCall(`/projects/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ name: newName })
            }).then(() => {
                loadProjects();
                showToast('✅ Project updated');
            });
        }
    }
    
    async function deleteProject(id) {
        if (confirm('Are you sure you want to delete this project?')) {
            const result = await apiCall(`/projects/${id}`, { method: 'DELETE' });
            if (result && result.success) {
                loadProjects();
                showToast('✅ Project deleted');
            } else {
                showToast('❌ Failed to delete project');
            }
        }
    }
    
    function openProject(id) {
        openBuilder(id);
    }
    
    function openBuilder(id) {
        localStorage.setItem('currentProjectId', id);
        window.location.href = `builder.html?id=${id}`;
    }
    
    // ============================================================
    // Helpers
    // ============================================================
    function formatDate(timestamp) {
        if (!timestamp) return 'Recently';
        if (timestamp.toDate) return timestamp.toDate().toLocaleDateString();
        return new Date(timestamp).toLocaleDateString();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ============================================================
    // Initialize
    // ============================================================
    loadProjects();
</script>
</body>
</html>
