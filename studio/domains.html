<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domains - VERO Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0A0E1A;
            --panel: #111827;
            --card: #1A2233;
            --card-border: #1E2D42;
            --cyan: #00D4FF;
            --purple: #7C3AED;
            --green: #10B981;
            --amber: #F59E0B;
            --red: #EF4444;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #4A5568;
            --topbar-h: 48px;
            --sidebar-w: 220px;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--sans); background: var(--bg); color: var(--text-primary); font-size: 13px; overflow: hidden; direction: rtl; }
        
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h); background: var(--panel); border-bottom: 1px solid var(--card-border); display: flex; align-items: center; padding: 0 16px; z-index: 100; gap: 16px; }
        .topbar-brand { display: flex; align-items: center; gap: 10px; min-width: var(--sidebar-w); }
        .brand-name { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.05em; color: var(--text-primary); }
        .brand-env { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: var(--cyan); background: rgba(0,212,255,0.1); padding: 2px 6px; border-radius: 3px; border: 1px solid rgba(0,212,255,0.2); }
        .topbar-status { display: flex; align-items: center; gap: 8px; flex: 1; }
        .status-pill { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--text-secondary); padding: 3px 8px; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); }
        .status-pill.online { color: var(--green); border-color: rgba(16,185,129,0.2); }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .user-chip { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; font-family: var(--mono); }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 12px; font-weight: 500; color: var(--text-primary); }
        .user-role { font-size: 10px; color: var(--text-secondary); }

        .sidebar { position: fixed; top: var(--topbar-h); right: 0; width: var(--sidebar-w); height: calc(100vh - var(--topbar-h)); background: var(--panel); border-left: 1px solid var(--card-border); overflow-y: auto; z-index: 90; }
        .sidebar-nav { padding: 12px 0; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; border-right: 2px solid transparent; font-size: 12px; }
        .nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); border-right-color: rgba(255,255,255,0.1); }
        .nav-item.active { color: var(--cyan); background: rgba(0,212,255,0.06); border-right-color: var(--cyan); }
        .nav-label { font-size: 12px; }
        .nav-divider { height: 1px; background: var(--card-border); margin: 8px 16px; }

        .main { margin-right: var(--sidebar-w); margin-top: var(--topbar-h); height: calc(100vh - var(--topbar-h)); overflow-y: auto; padding: 24px; }
        .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
        .page-title { font-size: 22px; font-weight: 600; color: var(--text-primary); }
        .page-subtitle { font-size: 12px; color: var(--text-secondary); }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; padding: 16px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--cyan); font-family: var(--mono); }
        .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

        .btn { padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
        .btn-primary { background: var(--cyan); color: #000; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary { background: var(--card); color: var(--text-secondary); border-color: var(--card-border); }
        .btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }
        .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.3); }

        .domains-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .domain-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; transition: all 0.2s; }
        .domain-card:hover { border-color: var(--cyan); transform: translateY(-2px); }
        .domain-name { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--cyan); margin-bottom: 8px; }
        .domain-status { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600; }
        .badge-active { background: rgba(16,185,129,0.15); color: var(--green); }
        .badge-pending { background: rgba(245,158,11,0.15); color: var(--amber); }
        .badge-ssl { background: rgba(0,212,255,0.15); color: var(--cyan); }

        .domain-actions { display: flex; gap: 8px; margin-top: 16px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: var(--panel); border: 1px solid var(--card-border); border-radius: 12px; padding: 24px; width: 450px; max-width: 90%; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin-bottom: 16px; background: var(--card); border: 1px solid var(--card-border); border-radius: 6px; color: var(--text-primary); }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; background: var(--card); border: 1px solid var(--cyan); border-radius: 8px; color: var(--cyan); z-index: 1000; animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2A3A50; border-radius: 3px; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#00D4FF"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#7C3AED"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#7C3AED"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5" fill="#00D4FF" opacity="0.5"/>
        </svg>
        <span class="brand-name">VERO Studio</span>
        <span class="brand-env">PRODUCTION</span>
    </div>
    <div class="topbar-status">
        <div class="status-pill online"><span class="dot"></span>API</div>
        <div class="status-pill online"><span class="dot"></span>DNS</div>
    </div>
    <div class="topbar-right">
        <div class="user-chip" onclick="logout()">
            <div class="user-avatar" id="userAvatar">SA</div>
            <div class="user-info">
                <span class="user-name" id="userName">Super Admin</span>
                <span class="user-role" id="userRole">super_admin</span>
            </div>
        </div>
    </div>
</div>

<div class="sidebar">
    <nav class="sidebar-nav">
        <a class="nav-item" onclick="navigate('dashboard')"><i class="fas fa-tachometer-alt"></i><span class="nav-label">Dashboard</span></a>
        <a class="nav-item" onclick="navigate('projects')"><i class="fas fa-folder-open"></i><span class="nav-label">Projects</span></a>
        <a class="nav-item" onclick="navigate('clients')"><i class="fas fa-users"></i><span class="nav-label">Clients</span></a>
        <a class="nav-item" onclick="navigate('templates')"><i class="fas fa-palette"></i><span class="nav-label">Templates</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="navigate('deploy')"><i class="fas fa-rocket"></i><span class="nav-label">Deploy</span></a>
        <a class="nav-item active" onclick="navigate('domains')"><i class="fas fa-globe"></i><span class="nav-label">Domains</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="navigate('team')"><i class="fas fa-users-cog"></i><span class="nav-label">Team</span></a>
        <a class="nav-item" onclick="navigate('settings')"><i class="fas fa-cog"></i><span class="nav-label">Settings</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="nav-label">Logout</span></a>
    </nav>
</div>

<main class="main">
    <div class="page-header">
        <div>
            <h1 class="page-title">Domain Management</h1>
            <p class="page-subtitle">Connect and manage custom domains for client websites</p>
        </div>
        <button class="btn btn-primary" onclick="showAddDomainModal()"><i class="fas fa-plus"></i> Add Domain</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="totalDomains">0</div><div class="stat-label">Total Domains</div></div>
        <div class="stat-card"><div class="stat-value" id="activeDomains">0</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><div class="stat-value" id="sslEnabled">0</div><div class="stat-label">SSL Enabled</div></div>
        <div class="stat-card"><div class="stat-value" id="pendingDomains">0</div><div class="stat-label">Pending</div></div>
    </div>

    <div id="domainsGrid" class="domains-grid">
        <div class="empty-state" style="text-align: center; padding: 40px;"><i class="fas fa-spinner fa-pulse"></i> Loading domains...</div>
    </div>
</main>

<!-- Add Domain Modal -->
<div id="domainModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-globe"></i> Add New Domain</h3>
        <input type="text" id="domainName" placeholder="example.com">
        <select id="domainWebsite">
            <option value="">-- Select Website --</option>
        </select>
        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closeModal('domainModal')">Cancel</button>
            <button class="btn btn-primary" onclick="addDomain()">Add Domain</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://verobac-production.up.railway.app/api';
    let domains = [];
    let websites = [];
    
    function getToken() { return localStorage.getItem('token'); }
    function getUser() { return JSON.parse(localStorage.getItem('user') || '{}'); }
    
    const user = getUser();
    if (!getToken() || !user) window.location.href = 'login.html';
    
    document.getElementById('userName').innerText = user.displayName || user.email || 'Admin';
    document.getElementById('userAvatar').innerText = (user.displayName || user.email || 'A')[0].toUpperCase();
    document.getElementById('userRole').innerText = user.role === 'super_admin' ? 'Super Admin' : user.role;
    
    function navigate(page) { window.location.href = `${page}.html`; }
    function logout() { localStorage.clear(); sessionStorage.clear(); window.location.href = 'login.html'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    async function apiCall(endpoint, options = {}) {
        const token = getToken();
        try {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(token && { 'Authorization': `Bearer ${token}` }), ...options.headers }
            });
            if (response.status === 401) { logout(); return null; }
            return await response.json();
        } catch (error) { return { success: false, error: error.message }; }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function loadDomains() {
        const result = await apiCall('/domains');
        if (result && result.success) {
            domains = result.domains || [];
            updateStats();
            renderDomains();
        }
    }
    
    async function loadWebsites() {
        const result = await apiCall('/websites');
        if (result && result.success) {
            websites = result.websites || [];
            const select = document.getElementById('domainWebsite');
            select.innerHTML = '<option value="">-- Select Website --</option>' + 
                websites.map(w => `<option value="${w.id}">${w.domain || w.name}</option>`).join('');
        }
    }
    
    function updateStats() {
        const total = domains.length;
        const active = domains.filter(d => d.status === 'active').length;
        const ssl = domains.filter(d => d.sslStatus === 'active').length;
        const pending = domains.filter(d => d.status === 'pending').length;
        document.getElementById('totalDomains').innerText = total;
        document.getElementById('activeDomains').innerText = active;
        document.getElementById('sslEnabled').innerText = ssl;
        document.getElementById('pendingDomains').innerText = pending;
    }
    
    function renderDomains() {
        const container = document.getElementById('domainsGrid');
        if (domains.length === 0) {
            container.innerHTML = '<div class="empty-state" style="text-align: center; padding: 60px;"><i class="fas fa-globe" style="font-size: 48px; opacity: 0.3;"></i><p>No domains added yet</p><button class="btn btn-primary" onclick="showAddDomainModal()">Add Your First Domain</button></div>';
            return;
        }
        
        container.innerHTML = domains.map(d => `
            <div class="domain-card">
                <div class="domain-name">${escapeHtml(d.domain)}</div>
                <div class="domain-status">
                    <span class="badge ${d.status === 'active' ? 'badge-active' : 'badge-pending'}">${d.status === 'active' ? 'Active' : 'Pending'}</span>
                    <span class="badge badge-ssl">SSL ${d.sslStatus === 'active' ? 'Active' : 'Pending'}</span>
                </div>
                <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">Website: ${d.websiteId ? (websites.find(w => w.id === d.websiteId)?.domain || '-') : '-'}</div>
                <div style="font-size: 11px; color: var(--text-muted);">Added: ${formatDate(d.createdAt)}</div>
                <div class="domain-actions">
                    <button class="btn btn-secondary" onclick="configureDNS('${d.id}')"><i class="fas fa-server"></i> DNS</button>
                    <button class="btn btn-secondary" onclick="enableSSL('${d.id}')"><i class="fas fa-lock"></i> SSL</button>
                    <button class="btn btn-danger" onclick="deleteDomain('${d.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }
    
    function showAddDomainModal() {
        loadWebsites();
        document.getElementById('domainModal').style.display = 'flex';
    }
    
    async function addDomain() {
        const domain = document.getElementById('domainName').value;
        const websiteId = document.getElementById('domainWebsite').value;
        
        if (!domain) { showToast('❌ Enter domain name'); return; }
        
        const result = await apiCall('/domains', {
            method: 'POST',
            body: JSON.stringify({ domain, websiteId: websiteId || null })
        });
        
        if (result && result.success) {
            closeModal('domainModal');
            document.getElementById('domainName').value = '';
            loadDomains();
            showToast('✅ Domain added successfully');
        } else {
            showToast('❌ Failed to add domain');
        }
    }
    
    function configureDNS(id) {
        showToast('🔧 DNS configuration panel opening...');
        // Open DNS configuration modal
    }
    
    function enableSSL(id) {
        showToast('🔒 Enabling SSL certificate... This may take a few minutes.');
        // Call SSL enable API
    }
    
    async function deleteDomain(id) {
        if (confirm('Are you sure you want to delete this domain?')) {
            const result = await apiCall(`/domains/${id}`, { method: 'DELETE' });
            if (result && result.success) {
                loadDomains();
                showToast('✅ Domain deleted');
            } else {
                showToast('❌ Failed to delete domain');
            }
        }
    }
    
    function formatDate(timestamp) {
        if (!timestamp) return '-';
        if (timestamp.toDate) return timestamp.toDate().toLocaleDateString();
        return new Date(timestamp).toLocaleDateString();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
    
    loadDomains();
    loadWebsites();
</script>
</body>
</html>
