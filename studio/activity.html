<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs - VERO Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0A0E1A;
            --panel: #111827;
            --card: #1A2233;
            --card-border: #1E2D42;
            --cyan: #00D4FF;
            --purple: #7C3AED;
            --green: #10B981;
            --amber: #F59E0B;
            --red: #EF4444;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #4A5568;
            --topbar-h: 48px;
            --sidebar-w: 220px;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--sans); background: var(--bg); color: var(--text-primary); font-size: 13px; overflow: hidden; direction: rtl; }
        
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h); background: var(--panel); border-bottom: 1px solid var(--card-border); display: flex; align-items: center; padding: 0 16px; z-index: 100; gap: 16px; }
        .topbar-brand { display: flex; align-items: center; gap: 10px; min-width: var(--sidebar-w); }
        .brand-name { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.05em; color: var(--text-primary); }
        .brand-env { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: var(--cyan); background: rgba(0,212,255,0.1); padding: 2px 6px; border-radius: 3px; border: 1px solid rgba(0,212,255,0.2); }
        .topbar-status { display: flex; align-items: center; gap: 8px; flex: 1; }
        .status-pill { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--text-secondary); padding: 3px 8px; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); }
        .status-pill.online { color: var(--green); border-color: rgba(16,185,129,0.2); }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .user-chip { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; font-family: var(--mono); }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 12px; font-weight: 500; color: var(--text-primary); }
        .user-role { font-size: 10px; color: var(--text-secondary); }

        .sidebar { position: fixed; top: var(--topbar-h); right: 0; width: var(--sidebar-w); height: calc(100vh - var(--topbar-h)); background: var(--panel); border-left: 1px solid var(--card-border); overflow-y: auto; z-index: 90; }
        .sidebar-nav { padding: 12px 0; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; border-right: 2px solid transparent; font-size: 12px; }
        .nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); border-right-color: rgba(255,255,255,0.1); }
        .nav-item.active { color: var(--cyan); background: rgba(0,212,255,0.06); border-right-color: var(--cyan); }
        .nav-label { font-size: 12px; }
        .nav-divider { height: 1px; background: var(--card-border); margin: 8px 16px; }

        .main { margin-right: var(--sidebar-w); margin-top: var(--topbar-h); height: calc(100vh - var(--topbar-h)); overflow-y: auto; padding: 24px; }
        .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
        .page-title { font-size: 22px; font-weight: 600; color: var(--text-primary); }
        .page-subtitle { font-size: 12px; color: var(--text-secondary); }

        .filter-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
        .filter-select { background: var(--card); border: 1px solid var(--card-border); border-radius: 6px; padding: 8px 12px; color: var(--text-primary); }
        .date-input { background: var(--card); border: 1px solid var(--card-border); border-radius: 6px; padding: 8px 12px; color: var(--text-primary); }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
        .btn-secondary { background: var(--card); color: var(--text-secondary); border-color: var(--card-border); }
        .btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }

        .activity-timeline { position: relative; padding-right: 20px; }
        .activity-item { position: relative; padding: 16px 20px 16px 0; border-bottom: 1px solid var(--card-border); display: flex; gap: 16px; transition: all 0.2s; }
        .activity-item:hover { background: rgba(0,212,255,0.03); border-radius: 8px; }
        .activity-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .activity-icon.login { background: rgba(0,212,255,0.15); color: var(--cyan); }
        .activity-icon.project { background: rgba(124,58,237,0.15); color: var(--purple); }
        .activity-icon.deploy { background: rgba(16,185,129,0.15); color: var(--green); }
        .activity-icon.client { background: rgba(245,158,11,0.15); color: var(--amber); }
        .activity-icon.delete { background: rgba(239,68,68,0.15); color: var(--red); }
        .activity-content { flex: 1; }
        .activity-title { font-weight: 600; margin-bottom: 4px; }
        .activity-details { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
        .activity-time { font-size: 10px; color: var(--text-muted); font-family: var(--mono); }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 24px; }
        .page-btn { padding: 6px 12px; background: var(--card); border: 1px solid var(--card-border); border-radius: 6px; cursor: pointer; }
        .page-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); }

        .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; background: var(--card); border: 1px solid var(--cyan); border-radius: 8px; color: var(--cyan); z-index: 1000; animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2A3A50; border-radius: 3px; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#00D4FF"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#7C3AED"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#7C3AED"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5" fill="#00D4FF" opacity="0.5"/>
        </svg>
        <span class="brand-name">VERO Studio</span>
        <span class="brand-env">PRODUCTION</span>
    </div>
    <div class="topbar-status">
        <div class="status-pill online"><span class="dot"></span>Logs</div>
        <div class="status-pill online"><span class="dot"></span>Audit</div>
    </div>
    <div class="topbar-right">
        <div class="user-chip" onclick="logout()">
            <div class="user-avatar" id="userAvatar">SA</div>
            <div class="user-info">
                <span class="user-name" id="userName">Super Admin</span>
                <span class="user-role" id="userRole">super_admin</span>
            </div>
        </div>
    </div>
</div>

<div class="sidebar">
    <nav class="sidebar-nav">
        <a class="nav-item" onclick="navigate('dashboard')"><i class="fas fa-tachometer-alt"></i><span class="nav-label">Dashboard</span></a>
        <a class="nav-item" onclick="navigate('projects')"><i class="fas fa-folder-open"></i><span class="nav-label">Projects</span></a>
        <a class="nav-item" onclick="navigate('clients')"><i class="fas fa-users"></i><span class="nav-label">Clients</span></a>
        <a class="nav-item" onclick="navigate('templates')"><i class="fas fa-palette"></i><span class="nav-label">Templates</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="navigate('deploy')"><i class="fas fa-rocket"></i><span class="nav-label">Deploy</span></a>
        <a class="nav-item" onclick="navigate('domains')"><i class="fas fa-globe"></i><span class="nav-label">Domains</span></a>
        <a class="nav-item" onclick="navigate('cloudflare')"><i class="fas fa-cloud"></i><span class="nav-label">Cloudflare</span></a>
        <a class="nav-item" onclick="navigate('r2')"><i class="fas fa-database"></i><span class="nav-label">R2 Storage</span></a>
        <a class="nav-item" onclick="navigate('media')"><i class="fas fa-images"></i><span class="nav-label">Media Library</span></a>
        <a class="nav-item" onclick="navigate('backups')"><i class="fas fa-history"></i><span class="nav-label">Backups</span></a>
        <a class="nav-item" onclick="navigate('team')"><i class="fas fa-users-cog"></i><span class="nav-label">Team</span></a>
        <a class="nav-item" onclick="navigate('chat')"><i class="fas fa-comments"></i><span class="nav-label">Chat</span></a>
        <a class="nav-item active" onclick="navigate('activity')"><i class="fas fa-list"></i><span class="nav-label">Activity</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="navigate('settings')"><i class="fas fa-cog"></i><span class="nav-label">Settings</span></a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="nav-label">Logout</span></a>
    </nav>
</div>

<main class="main">
    <div class="page-header">
        <div>
            <h1 class="page-title">Activity Logs</h1>
            <p class="page-subtitle">Immutable audit trail of all system actions</p>
        </div>
        <button class="btn btn-secondary" onclick="exportLogs()"><i class="fas fa-download"></i> Export CSV</button>
    </div>

    <div class="filter-bar">
        <select id="actionFilter" class="filter-select" onchange="filterLogs()">
            <option value="all">All Actions</option>
            <option value="login">Login</option>
            <option value="project">Project</option>
            <option value="deploy">Deployment</option>
            <option value="client">Client</option>
            <option value="delete">Delete</option>
        </select>
        <select id="userFilter" class="filter-select" onchange="filterLogs()">
            <option value="all">All Users</option>
        </select>
        <input type="date" id="dateFilter" class="date-input" onchange="filterLogs()">
        <button class="btn btn-secondary" onclick="clearFilters()"><i class="fas fa-eraser"></i> Clear</button>
    </div>

    <div id="activityList" class="activity-timeline">
        <div style="text-align: center; padding: 60px;"><i class="fas fa-spinner fa-pulse"></i> Loading activity...</div>
    </div>

    <div id="pagination" class="pagination"></div>
</main>

<script>
    const API_URL = 'https://verobac-production.up.railway.app/api';
    let allActivities = [];
    let currentPage = 1;
    let itemsPerPage = 20;
    
    function getToken() { return localStorage.getItem('token'); }
    function getUser() { return JSON.parse(localStorage.getItem('user') || '{}'); }
    
    const user = getUser();
    if (!getToken() || !user) window.location.href = 'login.html';
    
    document.getElementById('userName').innerText = user.displayName || user.email || 'Admin';
    document.getElementById('userAvatar').innerText = (user.displayName || user.email || 'A')[0].toUpperCase();
    document.getElementById('userRole').innerText = user.role === 'super_admin' ? 'Super Admin' : user.role;
    
    function navigate(page) { window.location.href = `${page}.html`; }
    function logout() { localStorage.clear(); sessionStorage.clear(); window.location.href = 'login.html'; }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function loadActivities() {
        const result = await apiCall('/activity');
        if (result && result.success && result.logs) {
            allActivities = result.logs;
        } else {
            allActivities = [
                { id: 1, action: 'login', user: 'Super Admin', userId: 'admin', details: 'Logged in from 10.0.0.1', timestamp: new Date(Date.now() - 1000 * 60 * 5), ip: '10.0.0.1' },
                { id: 2, action: 'project', user: 'J. Malik', userId: 'jm', details: 'Created project "luxe-interiors.com"', timestamp: new Date(Date.now() - 1000 * 60 * 30), projectId: 'p1' },
                { id: 3, action: 'deploy', user: 'S. Chen', userId: 'sc', details: 'Deployed luxe-interiors.com v3.4', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 2) },
                { id: 4, action: 'client', user: 'Super Admin', userId: 'admin', details: 'Added client "Bloom Florals"', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 4) },
                { id: 5, action: 'login', user: 'A. Torres', userId: 'at', details: 'Logged in from 10.0.0.5', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 5) },
                { id: 6, action: 'delete', user: 'Super Admin', userId: 'admin', details: 'Deleted project "old-client.com"', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 24) },
                { id: 7, action: 'deploy', user: 'J. Malik', userId: 'jm', details: 'Rollback vertex-gym.io to v1.1', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 48) },
                { id: 8, action: 'client', user: 'Super Admin', userId: 'admin', details: 'Updated client "North Peak Legal" plan', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 72) }
            ];
        }
        populateUserFilter();
        filterLogs();
    }
    
    function populateUserFilter() {
        const users = [...new Map(allActivities.map(a => [a.userId, { id: a.userId, name: a.user }])).values()];
        const select = document.getElementById('userFilter');
        select.innerHTML = '<option value="all">All Users</option>' + 
            users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
    }
    
    function getFilteredActivities() {
        const actionFilter = document.getElementById('actionFilter').value;
        const userFilter = document.getElementById('userFilter').value;
        const dateFilter = document.getElementById('dateFilter').value;
        
        let filtered = [...allActivities];
        if (actionFilter !== 'all') {
            filtered = filtered.filter(a => a.action === actionFilter);
        }
        if (userFilter !== 'all') {
            filtered = filtered.filter(a => a.userId === userFilter);
        }
        if (dateFilter) {
            filtered = filtered.filter(a => {
                const aDate = new Date(a.timestamp).toISOString().split('T')[0];
                return aDate === dateFilter;
            });
        }
        return filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    }
    
    function filterLogs() {
        currentPage = 1;
        renderActivities();
    }
    
    function clearFilters() {
        document.getElementById('actionFilter').value = 'all';
        document.getElementById('userFilter').value = 'all';
        document.getElementById('dateFilter').value = '';
        filterLogs();
    }
    
    function renderActivities() {
        const filtered = getFilteredActivities();
        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        const start = (currentPage - 1) * itemsPerPage;
        const paginated = filtered.slice(start, start + itemsPerPage);
        
        const container = document.getElementById('activityList');
        if (paginated.length === 0) {
            container.innerHTML = '<div class="empty-state" style="text-align: center; padding: 60px;"><i class="fas fa-history" style="font-size: 48px;"></i><p>No activity logs found</p></div>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        
        container.innerHTML = paginated.map(a => `
            <div class="activity-item">
                <div class="activity-icon ${getIconClass(a.action)}">
                    <i class="fas ${getIcon(a.action)}"></i>
                </div>
                <div class="activity-content">
                    <div class="activity-title">${getActionTitle(a.action)}</div>
                    <div class="activity-details">${escapeHtml(a.details)}</div>
                    <div class="activity-time">
                        <i class="far fa-clock"></i> ${formatTime(a.timestamp)}
                        <span style="margin-right: 16px;"><i class="fas fa-user"></i> ${escapeHtml(a.user)}</span>
                        ${a.ip ? `<span style="margin-right: 16px;"><i class="fas fa-network-wired"></i> ${a.ip}</span>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
        
        renderPagination(totalPages);
    }
    
    function renderPagination(totalPages) {
        if (totalPages <= 1) {
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        
        let html = '';
        for (let i = 1; i <= Math.min(totalPages, 10); i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }
        document.getElementById('pagination').innerHTML = html;
    }
    
    function goToPage(page) {
        currentPage = page;
        renderActivities();
    }
    
    function getIconClass(action) {
        const icons = { login: 'login', project: 'project', deploy: 'deploy', client: 'client', delete: 'delete' };
        return icons[action] || 'project';
    }
    
    function getIcon(action) {
        const icons = { login: 'fa-sign-in-alt', project: 'fa-plus-circle', deploy: 'fa-rocket', client: 'fa-user-plus', delete: 'fa-trash-alt' };
        return icons[action] || 'fa-circle';
    }
    
    function getActionTitle(action) {
        const titles = { login: '🔐 User Login', project: '📁 Project Action', deploy: '🚀 Deployment', client: '👤 Client Action', delete: '🗑️ Delete Action' };
        return titles[action] || action;
    }
    
    function formatTime(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000 / 60);
        
        if (diff < 1) return 'Just now';
        if (diff < 60) return `${diff} minutes ago`;
        if (diff < 1440) return `${Math.floor(diff / 60)} hours ago`;
        return date.toLocaleDateString() + ' ' + date.toLocaleTimeString().slice(0, 5);
    }
    
    function exportLogs() {
        const filtered = getFilteredActivities();
        const csv = filtered.map(a => ({
            time: new Date(a.timestamp).toLocaleString(),
            action: getActionTitle(a.action),
            user: a.user,
            details: a.details,
            ip: a.ip || '-'
        }));
        
        const headers = Object.keys(csv[0] || {});
        const rows = csv.map(obj => headers.map(h => JSON.stringify(obj[h] || '')).join(','));
        const csvContent = [headers.join(','), ...rows].join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `activity_logs_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('📥 Logs exported successfully');
    }
    
    async function apiCall(endpoint, options = {}) {
        const token = getToken();
        try {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: { ...(token && { 'Authorization': `Bearer ${token}` }), ...options.headers }
            });
            if (response.status === 401) { logout(); return null; }
            return await response.json();
        } catch (error) { return { success: false, error: error.message }; }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
    
    loadActivities();
</script>
</body>
</html>
